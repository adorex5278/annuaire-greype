<script>
const team = [

  { name:"Maëva DIJOUX", role:"Responsable Qualité", phone:"33616380012", display:"+33 6 16 38 00 12", whatsapp:true, linkedin:"https://www.linkedin.com/in/maeva-dijoux-3244a294/" },
  { name:"Sébastien NIETCHE", role:"Commercial", phone:"33652687230", display:"+33 6 52 68 72 30", whatsapp:true, linkedin:"https://www.linkedin.com/in/sebastien-nietche/", pappers:"https://www.pappers.fr/entreprise/nietche-corones-sebastien-933749897" },
  { name:"Matthias VERNE", role:"Commercial", phone:"33781699608", display:"+33 7 81 69 96 08", whatsapp:true, linkedin:"https://www.linkedin.com/in/matthias-verne-6b534721b/", pappers:"https://www.pappers.fr/entreprise/verne-matthias-979015682" },
  { name:"Frédéric CAYUELA", role:"Commercial", phone:"33628316922", display:"+33 6 28 31 69 22", whatsapp:true, linkedin:"https://www.linkedin.com/in/fr%C3%A9d%C3%A9ric-cayuela-a41682132/" },
  { name:"Elodie DIAZ", role:"Assistante commerciale", phone:"33621915522", display:"+33 6 21 91 55 22", whatsapp:true, linkedin:"https://www.linkedin.com/in/elodie-diaz-b20724247/" },
  { name:"Vanessa SAINT-DENIS", role:"Assistante commerciale", phone:"33468819725", display:"+33 4 68 81 97 25", linkedin:"https://www.linkedin.com/in/vanessa-saint-denis/" },
  { name:"Alexandre CABEZAS", role:"Commercial", phone:"33628229957", display:"+33 6 28 22 99 57", whatsapp:true },
  { name:"Nicolas ORIBES", role:"Commercial", phone:"33776039958", display:"+33 7 76 03 99 58", whatsapp:true }
];

const grid = document.getElementById("team");

team.forEach(m => {
  const initials = m.name.split(/[ -]/).map(w => w[0]).join("").slice(0,3);

  grid.innerHTML += `
    <div class="card">
      <div class="card-top"></div>
      <div class="card-content">
        <div class="avatar">${initials}</div>
        <div class="name">${m.name}</div>
        <div class="role">${m.role}</div>
        <a class="phone" href="tel:${m.phone}">📞 ${m.display}</a>
        <div class="actions">
          ${m.whatsapp ? `<button class="btn whatsapp" onclick="openWhatsApp('${m.phone}')">💬</button>` : ""}
          ${m.linkedin ? `<a class="btn linkedin" href="${m.linkedin}" target="_blank">in</a>` : ""}
          ${m.pappers ? `<a class="btn pappers" href="${m.pappers}" target="_blank">📄</a>` : ""}
        </div>
      </div>
    </div>
  `;
});

function openWhatsApp(phone) {
  const url = `https://wa.me/${phone}`;

  // ouverture directe (mobile-friendly)
  window.location.href = url;

  // fallback simple et fiable
  setTimeout(() => {
    copyText(url);
    showToast("Lien WhatsApp copié");
  }, 1500);
}

function copyText(text) {
  const el = document.createElement("textarea");
  el.value = text;
  el.setAttribute("readonly", "");
  el.style.position = "absolute";
  el.style.left = "-9999px";
  document.body.appendChild(el);
  el.select();
  document.execCommand("copy");
  document.body.removeChild(el);
}

function showToast(msg) {
  const t = document.createElement("div");
  t.textContent = msg;
  t.style.cssText = `
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#0A5C3C;
    color:#fff;
    padding:10px 16px;
    border-radius:8px;
    font-size:14px;
    box-shadow:0 4px 12px rgba(0,0,0,.2);
    z-index:9999;
  `;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}
</script>
