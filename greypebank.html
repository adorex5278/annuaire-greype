<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https://public.saintcharlesinternational.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'">

<title>Coordonnées bancaires — GREYPE FRANCE</title>
<meta name="description" content="Coordonnées bancaires de GREYPE FRANCE.">
<meta name="theme-color" content="#0A5C3C">

<!-- Page contenant un IBAN : on la retire des moteurs de recherche.
     Retirer cette ligne si l'indexation est souhaitée. -->
<meta name="robots" content="noindex, nofollow">

<link rel="icon" href="https://public.saintcharlesinternational.com/wp-content/uploads/2019/05/greype.jpg" data-fallback="assets/favicon.png">
<link rel="apple-touch-icon" href="https://public.saintcharlesinternational.com/wp-content/uploads/2019/05/greype.jpg" data-fallback="assets/apple-touch-icon.png">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: url('https://public.saintcharlesinternational.com/wp-content/uploads/2019/05/greype.jpg') no-repeat center top fixed;
  background-size: min(70%, 420px);
  background-color: #0b3d2a;
  color: white;
  min-height: 100vh;
  min-height: 100dvh;
  padding: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: block;
  z-index: 0;
  pointer-events: none;
}

.rib-container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 480px;
  background: rgba(0, 0, 0, 0.7);
  padding: 30px;
  border-radius: 10px;
  text-align: center;
  box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
}

.rib-container h2 {
  margin-bottom: 10px;
  font-size: 1.5rem;
}

.rib-container h3 {
  margin-bottom: 20px;
  font-size: clamp(1.8rem, 8vw, 3rem);
}

.rib-container p {
  margin-top: 10px;
  overflow-wrap: anywhere;
}

button {
  background: #3498db;
  color: white;
  border: none;
  padding: 15px 30px;
  margin-top: 15px;
  cursor: pointer;
  border-radius: 5px;
  font-size: 1.2rem;
  transition: 0.3s;
  margin-bottom: 20px;
}

button:hover {
  background: #2980b9;
  transform: scale(1.05);
  box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
}

button:active {
  transform: scale(1);
}

button:focus-visible {
  outline: 3px solid #fff;
  outline-offset: 3px;
}

#toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #0A5C3C;
  color: #fff;
  padding: 10px 16px;
  border-radius: 8px;
  font-size: 14px;
  box-shadow: 0 4px 12px rgba(0,0,0,.2);
  z-index: 9999;
}

@media (prefers-reduced-motion: reduce) {
  button { transition: none; }
  button:hover { transform: none; }
}
</style>
</head>
<body>

<canvas id="bgCanvas" aria-hidden="true"></canvas>

<div class="rib-container">
  <h2>Coordonnées Bancaires de :</h2>
  <h3><strong>GREYPE FRANCE</strong></h3>

  <p><strong>Banque :</strong> <span id="banque">BPS PERPIGNAN ENTREPRISE-00070</span></p>
  <button type="button" onclick="copyFrom('banque')">Copier/copy</button>

  <p><strong>IBAN :</strong> <span id="iban">FR7616607000282812108151573</span></p>
  <button type="button" onclick="copyFrom('iban')">Copier/copy</button>

  <p><strong>BIC :</strong> <span id="bic">CCBPFRPPPPG</span></p>
  <button type="button" onclick="copyFrom('bic')">Copier/copy</button>
</div>

<script>
// --- Copie, avec repli si l'API Clipboard est indisponible (http, vieux navigateur) ---
function copyFrom(id) {
  var el = document.getElementById(id);
  if (!el) return;
  var text = el.textContent.trim();

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text)
      .then(function () { toast("Copié : " + text); })
      .catch(function () { selectText(el); toast("Copie auto impossible — texte sélectionné"); });
  } else {
    selectText(el);
    toast("Copie auto impossible — texte sélectionné");
  }
}

function selectText(el) {
  var range = document.createRange();
  range.selectNodeContents(el);
  var sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}

var toastTimer;
function toast(msg) {
  var t = document.getElementById("toast");
  if (!t) {
    t = document.createElement("div");
    t.id = "toast";
    document.body.appendChild(t);
  }
  t.textContent = msg;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function () { t.remove(); }, 2500);
}

// --- Repli local si le logo distant ne répond pas (fond de page + favicon) ---
(function () {
  var links = document.querySelectorAll("link[data-fallback]");
  var probe = new Image();
  probe.onerror = function () {
    document.body.style.backgroundImage = "url('assets/logo.jpg')";
    for (var i = 0; i < links.length; i++) {
      links[i].href = links[i].getAttribute("data-fallback");
    }
  };
  probe.src = "https://public.saintcharlesinternational.com/wp-content/uploads/2019/05/greype.jpg";
})();

// --- Animation de fond ---
window.addEventListener('DOMContentLoaded', function () {
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  var canvas = document.getElementById('bgCanvas');
  var ctx = canvas.getContext('2d');

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  var particles = [];
  for (var i = 0; i < 50; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      radius: Math.random() * 3 + 1,
      dx: Math.random() * 2 - 1,
      dy: Math.random() * 2 - 1
    });
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(function (p) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.fill();
      p.x += p.dx;
      p.y += p.dy;
      if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
    });
    requestAnimationFrame(animate);
  }
  animate();
});
</script>

</body>
</html>
