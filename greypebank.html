<body>

<div class="bg-logo" id="bgLogo" aria-hidden="true"></div>
<canvas id="bgCanvas" aria-hidden="true"></canvas>

<div class="rib-container">
    <h2>Coordonnées Bancaires de :</h2>

    <div class="banks-wrapper">

                <button type="button" onclick="copyFrom('ca-iban')" aria-label="Copier l'IBAN Crédit Agricole">Copier</button>
            </div>

            <div class="info-group">
                <p>BIC</p>
                <span class="data-text" id="ca-bic">AGRIFRPP871</span>

<script>
/* ------------------------------------------------------------------
   COPIE
   La valeur copiée est lue dans le <span> affiché : une seule source
   de vérité. Les IBAN sont affichés par groupes de 4 et copiés sans
   espaces (classe .iban). Modifier un numéro à un seul endroit suffit.
------------------------------------------------------------------ */
function copyFrom(id) {
    var el = document.getElementById(id);
    if (!el) return;
    var text = el.textContent.trim();
    if (el.classList.contains("iban")) text = text.replace(/\s+/g, "");

    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text)
            .then(function () { toast("Copié : " + text); })
            .catch(function () { fallbackCopy(el); });
    } else {
        fallbackCopy(el);
    }
}

function fallbackCopy(el) {
    var range = document.createRange();
    range.selectNodeContents(el);
    var sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    toast("Copie automatique indisponible — texte sélectionné");
}

var toastTimer;
function toast(msg) {
    var t = document.getElementById("toast");
    if (!t) {
        t = document.createElement("div");
        t.id = "toast";
        t.setAttribute("role", "status");
        document.body.appendChild(t);
    }
    t.textContent = msg;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { t.remove(); }, 2500);
}

/* ------------------------------------------------------------------
   LOGO DE FOND : repli local si le serveur distant ne répond pas
------------------------------------------------------------------ */
(function () {
    var remote = "https://public.saintcharlesinternational.com/wp-content/uploads/2019/05/greype.jpg";
    var links = document.querySelectorAll("link[data-fallback]");
    var probe = new Image();
    probe.onerror = function () {
        var logo = document.getElementById("bgLogo");
        if (logo) logo.style.backgroundImage = "url('assets/logo.jpg')";
        for (var i = 0; i < links.length; i++) {
            links[i].href = links[i].getAttribute("data-fallback");
        }
    };
    probe.src = remote;
})();

/* ------------------------------------------------------------------
   ANIMATION DE FOND
------------------------------------------------------------------ */
(function () {
    if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;

    var canvas = document.getElementById("bgCanvas");
    var ctx = canvas.getContext("2d");
    var width, height, particles = [];

    var config = {
        count: 60,
        gravity: 0.08,
        friction: 0.995,
        explosionChance: 0.03,
        explosionForce: 20,
        emojiScale: 1.6,
        emojis: ["🍆", "🍅", "🫑", "🥒", "🧅", "🍊", "🍋"]
    };

    var emojiCache = {};

    function preRender() {
        config.emojis.forEach(function (e) {
            var c = document.createElement("canvas");
            c.width = 80;
            c.height = 80;
            var x = c.getContext("2d");
            x.font = "50px Arial";
            x.textAlign = "center";
            x.textBaseline = "middle";
            x.fillText(e, 40, 40);
            emojiCache[e] = c;
        });
    }

    function Part() { this.init(); }
    Part.prototype.init = function () {
        this.r = 15 + Math.random() * 20;
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.dx = (Math.random() - 0.5) * 4;
        this.dy = (Math.random() - 0.5) * 4;
        this.img = emojiCache[config.emojis[Math.floor(Math.random() * config.emojis.length)]];
    };
    Part.prototype.update = function () {
        this.dy += config.gravity;
        this.dx *= config.friction;
        this.dy *= config.friction;
        this.x += this.dx;
        this.y += this.dy;
        if (this.x - this.r < 0)      { this.x = this.r;          this.dx *= -1; }
        if (this.x + this.r > width)  { this.x = width - this.r;  this.dx *= -1; }
        if (this.y - this.r < 0)      { this.y = this.r;          this.dy *= -1; }
        if (this.y + this.r > height) {
            this.y = height - this.r;
            this.dy *= -0.9;
            if (Math.abs(this.dy) < 0.3) this.dy = 0;
        }
    };
    Part.prototype.draw = function () {
        var size = this.r * 2 * config.emojiScale;
        ctx.drawImage(this.img, this.x - size / 2, this.y - size / 2, size, size);
    };

    function explode(ex, ey) {
        particles.forEach(function (p) {
            var dx = p.x - ex, dy = p.y - ey;
            var dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 400 && dist > 0) {
                var force = ((400 - dist) / 400) * config.explosionForce;
                p.dx += (dx / dist) * force;
                p.dy -= Math.abs(dy / dist) * force * 1.5;
            }
        });
    }

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resize);

    // Le clic ne doit pas déclencher d'explosion sur les boutons de copie
    window.addEventListener("mousedown", function (e) {
        if (e.target.closest(".rib-container")) return;
        explode(e.clientX, e.clientY);
    });
    window.addEventListener("touchstart", function (e) {
        if (e.target.closest(".rib-container")) return;
        explode(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });

    resize();
    preRender();
    particles = [];
    for (var i = 0; i < config.count; i++) particles.push(new Part());

    (function animate() {
        ctx.clearRect(0, 0, width, height);
        if (Math.random() < config.explosionChance) {
            explode(Math.random() * width, height);
        }
        particles.forEach(function (p) { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    })();
})();
</script>

</body>
